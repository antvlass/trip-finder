name: Publish docker image on new tag

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  test:
    uses: ./.github/workflows/test.yaml
    with:
      poetry-version: "1.8.2"

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.REGISTRY || 'ghcr.io' }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
            POETRY_VERSION=1.8.2
          cache-from: type=registry,ref=${{ vars.REGISTRY || 'ghcr.io' }}/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ vars.REGISTRY || 'ghcr.io' }}/${{ github.repository }}:buildcache,mode=max
